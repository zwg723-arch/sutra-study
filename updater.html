<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🚀 一鍵更新 GitHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#0f0a14;color:#f0e8ff;min-height:100vh;padding:20px 16px 60px;max-width:520px;margin:0 auto;}
h1{color:#ff6bad;font-size:1.5rem;margin-bottom:4px;text-align:center;padding-top:8px;}
.sub{color:#b090cc;font-size:.85rem;text-align:center;margin-bottom:20px;line-height:1.6;}
.step{background:#1e1228;border:2px solid #5a3070;border-radius:16px;padding:18px 16px;margin-bottom:14px;box-shadow:4px 4px 0 #0a0514;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#ff6bad;color:#fff;font-size:.8rem;font-weight:900;margin-right:8px;vertical-align:middle;}
.step-title{font-size:1rem;font-weight:800;color:#f0e8ff;margin-bottom:10px;}

/* Method toggle */
.method-toggle{display:flex;gap:8px;margin-bottom:14px;}
.method-btn{flex:1;padding:10px 8px;border:2px solid #5a3070;border-radius:12px;background:#150a20;color:#b090cc;font-size:.85rem;font-weight:700;cursor:pointer;-webkit-appearance:none;text-align:center;transition:all .18s;}
.method-btn.active{border-color:#ff6bad;background:rgba(255,107,173,.12);color:#ff6bad;}

/* File upload */
.drop-zone{border:2.5px dashed #5a3070;border-radius:14px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#150a20;}
.drop-zone:hover,.drop-zone.drag-over{border-color:#ff6bad;background:#1e0a28;}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:2rem;display:block;margin-bottom:6px;}
.drop-label{font-size:.92rem;font-weight:700;color:#c9a8ff;margin-bottom:3px;}
.drop-hint{font-size:.76rem;color:#7a5a90;}
.file-chosen{display:none;border-radius:10px;padding:10px 14px;font-size:.85rem;margin-top:10px;}

/* Paste area */
.paste-steps{background:#0a0514;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:.83rem;line-height:1.9;color:#b090cc;}
.paste-steps strong{color:#ff6bad;}
textarea.code-paste{width:100%;background:#0f0a14;color:#f0e8ff;border:1.5px solid #5a3070;border-radius:10px;padding:12px;font-size:.78rem;font-family:monospace;min-height:100px;outline:none;resize:vertical;-webkit-appearance:none;}
textarea.code-paste:focus{border-color:#ff6bad;}
.paste-check{font-size:.78rem;margin-top:6px;}
.btn-paste-check{padding:7px 16px;background:#3a1050;color:#c9a8ff;border:1.5px solid #5a3070;border-radius:10px;cursor:pointer;font-size:.8rem;font-weight:700;-webkit-appearance:none;margin-top:8px;width:100%;}

/* Password + push */
label{display:block;font-size:.82rem;color:#b090cc;font-weight:700;margin-bottom:6px;}
input[type=password],input[type=text]{width:100%;background:#0f0a14;color:#f0e8ff;border:1.5px solid #5a3070;border-radius:10px;padding:11px 14px;font-size:.95rem;outline:none;-webkit-appearance:none;}
input:focus{border-color:#ff6bad;}
.btn-push{width:100%;padding:16px;border:none;border-radius:16px;background:#ff6bad;color:#fff;font-size:1.05rem;font-weight:900;cursor:pointer;-webkit-appearance:none;transition:all .15s;margin-top:6px;box-shadow:0 5px 0 #cc1f65;}
.btn-push:active{transform:translateY(4px);box-shadow:0 1px 0 #cc1f65;}
.btn-push:disabled{background:#5a3070;color:#7a5a90;box-shadow:none;cursor:not-allowed;transform:none;}
.status{border-radius:12px;padding:14px 16px;margin-top:14px;font-size:.9rem;line-height:1.7;display:none;word-break:break-all;}
.status.ok{background:rgba(61,221,212,.1);border:1.5px solid #3dddd4;color:#3dddd4;}
.status.err{background:rgba(255,107,107,.1);border:1.5px solid #ff6b6b;color:#ff9090;}
.status.loading{background:rgba(180,142,245,.1);border:1.5px solid #b48ef5;color:#c9a8ff;}
.progress{height:6px;background:#2a1a38;border-radius:3px;margin-top:10px;overflow:hidden;display:none;}
.progress-bar{height:100%;background:linear-gradient(90deg,#ff6bad,#c9a8ff);border-radius:3px;width:0%;transition:width .3s;}
code{background:#0f0a14;padding:1px 6px;border-radius:5px;color:#ff6bad;}
</style>
</head>
<body>
<h1>🚀 一鍵推送到 GitHub</h1>
<p class="sub">更新完畢後 Vercel 自動重新部署（約 1 分鐘）</p>

<!-- Step 1: Choose method -->
<div class="step">
  <div class="step-title"><span class="step-num">1</span>選擇你的操作方式</div>
  <div class="method-toggle">
    <button class="method-btn active" id="btnPhone" onclick="setMethod('phone')">📱 手機<br><span style="font-size:.72rem;font-weight:400;">Code → Copy</span></button>
    <button class="method-btn" id="btnDesktop" onclick="setMethod('desktop')">💻 電腦<br><span style="font-size:.72rem;font-weight:400;">下載檔案</span></button>
  </div>

  <!-- Phone method -->
  <div id="phoneMethod">
    <div class="paste-steps">
      在 Claude 對話裡找到最新的 <code>index.html</code>，點右上角 <strong>「⋯」</strong><br>
      ① 點 <strong>「Code」</strong> 切換到原始碼模式<br>
      ② 點 <strong>「Copy」</strong> 複製全部原始碼<br>
      ③ 回到這個頁面，貼到下方輸入框
    </div>
    <textarea class="code-paste" id="pasteContent" placeholder="長按這裡 → 貼上（從 Claude Code 模式複製的原始碼）" oninput="onPasteInput()"></textarea>
    <div class="paste-check" id="pasteCheck"></div>
  </div>

  <!-- Desktop method -->
  <div id="desktopMethod" style="display:none;">
    <div style="font-size:.83rem;color:#b090cc;margin-bottom:10px;line-height:1.7;">
      在 Claude 對話裡點 <code>index.html</code> 旁的下載按鈕（⬇️），儲存到電腦後選擇：
    </div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".html,text/html" onchange="onFileChosen(this)">
      <span class="drop-icon">📂</span>
      <div class="drop-label">點這裡選擇 index.html</div>
      <div class="drop-hint">或直接拖拉檔案到這裡</div>
    </div>
    <div class="file-chosen" id="fileChosen"></div>
  </div>
</div>

<!-- Step 2: Password + Push -->
<div class="step">
  <div class="step-title"><span class="step-num">2</span>輸入密碼並推送</div>
  <div style="margin-bottom:14px;">
    <label>推送密碼（PUSH_SECRET）</label>
    <input type="password" id="secret" placeholder="輸入密碼" autocomplete="current-password">
  </div>
  <div style="margin-bottom:14px;">
    <label>Commit 說明（選填）</label>
    <input type="text" id="message" placeholder="例如：新增好友 QR Code 功能">
  </div>
  <button class="btn-push" id="pushBtn" onclick="pushToGitHub()" disabled>🔒 請先完成上方步驟</button>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status" id="status"></div>
</div>

<script>
var selectedContent=null;
var currentMethod='phone';
var API_URL=window.location.origin+'/api/github-push';
try{var s=sessionStorage.getItem('push_secret');if(s)document.getElementById('secret').value=s;}catch(e){}

function setMethod(m){
  currentMethod=m;
  selectedContent=null;
  document.getElementById('pushBtn').disabled=true;
  document.getElementById('pushBtn').textContent='🔒 請先完成上方步驟';
  document.getElementById('btnPhone').classList.toggle('active',m==='phone');
  document.getElementById('btnDesktop').classList.toggle('active',m==='desktop');
  document.getElementById('phoneMethod').style.display=m==='phone'?'block':'none';
  document.getElementById('desktopMethod').style.display=m==='desktop'?'block':'none';
}

function onPasteInput(){
  var val=document.getElementById('pasteContent').value.trim();
  var el=document.getElementById('pasteCheck');
  if(!val){el.textContent='';selectedContent=null;document.getElementById('pushBtn').disabled=true;document.getElementById('pushBtn').textContent='🔒 請先完成上方步驟';return;}
  var ok=val.includes('</html>')&&val.length>50000;
  var kb=Math.round(val.length/1024);
  if(ok){
    el.style.color='#3dddd4';
    el.textContent='✅ 內容正常（'+kb+' KB），可以推送！';
    selectedContent=val;
    document.getElementById('pushBtn').disabled=false;
    document.getElementById('pushBtn').textContent='🚀 推送到 GitHub';
  }else if(val.length>1000){
    el.style.color='#ff9090';
    el.textContent='⚠️ 內容不完整（'+kb+' KB）。請確認在 Claude 切換到「Code」模式後再複製。';
    selectedContent=null;
    document.getElementById('pushBtn').disabled=true;
    document.getElementById('pushBtn').textContent='⚠️ 內容不完整';
  }else{
    el.style.color='#b090cc';
    el.textContent='繼續貼上…（目前 '+kb+' KB）';
  }
}

function onFileChosen(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    selectedContent=e.target.result;
    var kb=Math.round(selectedContent.length/1024);
    var ok=selectedContent.includes('</html>')&&selectedContent.length>50000;
    var el=document.getElementById('fileChosen');
    el.style.display='block';
    if(ok){
      el.style.cssText='display:block;background:rgba(61,221,212,.1);border:1.5px solid #3dddd4;border-radius:10px;padding:10px 14px;font-size:.85rem;margin-top:10px;color:#3dddd4;';
      el.textContent='✅ '+file.name+'（'+kb+' KB）— 檔案正常！';
      document.getElementById('pushBtn').disabled=false;
      document.getElementById('pushBtn').textContent='🚀 推送到 GitHub';
    }else{
      el.style.cssText='display:block;background:rgba(255,107,107,.1);border:1.5px solid #ff6b6b;border-radius:10px;padding:10px 14px;font-size:.85rem;margin-top:10px;color:#ff9090;';
      el.textContent='⚠️ 檔案不完整（'+kb+' KB），請重新下載 index.html';
      selectedContent=null;
      document.getElementById('pushBtn').disabled=true;
    }
  };
  reader.readAsText(file,'utf-8');
}

var dz=document.getElementById('dropZone');
if(dz){
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
  dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag-over');var f=e.dataTransfer.files[0];if(f){document.getElementById('fileInput').files=e.dataTransfer.files;onFileChosen(document.getElementById('fileInput'));}});
}

async function pushToGitHub(){
  if(!selectedContent){showStatus('err','請先提供 index.html 內容');return;}
  var secret=document.getElementById('secret').value.trim();
  var message=document.getElementById('message').value.trim()||'Update via Claude mobile';
  if(!secret){showStatus('err','請輸入推送密碼');return;}
  var btn=document.getElementById('pushBtn');
  btn.disabled=true;btn.textContent='⏳ 推送中…';
  showStatus('loading','正在推送到 GitHub…');setProgress(30);
  try{
    var res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:secret,content:selectedContent,filename:'index.html',message:message})});
    setProgress(80);
    var data=await res.json();setProgress(100);
    if(data.success){
      try{sessionStorage.setItem('push_secret',secret);}catch(e){}
      showStatus('ok','✅ 推送成功！約 1 分鐘後網站自動更新。'+(data.commit?'<br><a href="'+data.commit+'" target="_blank" style="color:#3dddd4;">查看 Commit ↗</a>':''));
      btn.textContent='✅ 推送成功';
    }else{
      showStatus('err','❌ '+(data.error||'未知錯誤'));
      btn.disabled=false;btn.textContent='🚀 推送到 GitHub';
    }
  }catch(e){
    showStatus('err','❌ 網路錯誤：'+e.message);
    btn.disabled=false;btn.textContent='🚀 推送到 GitHub';
  }
  setProgress(0);
}
function showStatus(t,h){var el=document.getElementById('status');el.className='status '+t;el.innerHTML=h;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'nearest'});}
function setProgress(p){var pr=document.getElementById('progress');var b=document.getElementById('progressBar');if(p>0){pr.style.display='block';b.style.width=p+'%';}else{setTimeout(function(){pr.style.display='none';b.style.width='0%';},600);}}
</script>
</body>
</html>
